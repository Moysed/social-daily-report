        query_type: Latest
        limit: 100
      # Thai-language signal: drop lang filter, use Thai keywords directly.
      # min_faves:1 since Thai tech Twitter has a small but engaged audience.
      - connector: x
        query: "(\"AI ไทย\" OR \"AI ภาษาไทย\" OR \"LLM ไทย\" OR \"โมเดลภาษาไทย\" OR \"AI สัญชาติไทย\" OR \"Generative AI ไทย\") min_faves:1"
        query_type: Latest
        limit: 100
      # Broader Thai tech / startup / edtech chatter — feeds the topic with
      # enough surrounding context so Opus isn't reasoning over <20 posts.
      - connector: x
        query: "(\"Thai startup\" OR \"Thai tech\" OR \"กรุงเทพ tech\" OR \"BMA AI\" OR \"NIA\" OR \"depa\") min_faves:2"
        query_type: Latest
        limit: 60
