# Social Daily Report — source config.
# Every source is KEYLESS (free, no API key): HackerNews API, Bluesky public
# AppView, Reddit public .json, YouTube channel RSS, and arbitrary RSS/Atom feeds.
#
# connector params:
#   hackernews            limit
#   bluesky    query      [sort: top|latest]
#   reddit     subreddit  [query] [sort: top|hot|new] [time: hour|day|week|...]
#   youtube    channel_id | playlist_id | user
#   rss        feed_url | feeds: [..]

lookback_hours: 48

topics:
  ai-devtools:
    title: "AI Devtools"
    tags: [ai, devtools, agents]
    focus: >
      AI developer tools, coding agents, LLM APIs and models, IDE/editor AI,
      agent frameworks, eval/observability tooling — anything a software /
      game / XR / edutech studio could realistically adopt.
    sources:
      - connector: hackernews
        limit: 40
      - connector: reddit
        subreddit: LocalLLaMA
        sort: top
        time: day
        limit: 25
      - connector: reddit
        subreddit: MachineLearning
        sort: top
        time: day
        limit: 15
      - connector: bluesky
        query: "AI agents OR coding agents lang:en"
        sort: latest
        limit: 25
      - connector: rss
        feed_url: "https://huggingface.co/blog/feed.xml"
        limit: 15
      # X (Twitter) via Xquik — paid, ~1 credit/tweet (~$0.00015). Needs XQUIK_API_KEY.
      - connector: x
        query: "AI coding agents min_faves:50 lang:en"
        query_type: Latest
        limit: 20

  game-dev:
    title: "Game Dev"
    tags: [gamedev, engines, tools]
    focus: >
      Game development — engines (Unreal, Unity, Godot), tooling, graphics,
      production workflows, releases, and AI used in game pipelines.
    sources:
      - connector: reddit
        subreddit: gamedev
        sort: top
        time: day
        limit: 30
      - connector: reddit
        subreddit: Unity3D
        sort: top
        time: day
        limit: 15
      - connector: reddit
        subreddit: unrealengine
        sort: top
        time: day
        limit: 15
      - connector: reddit
        subreddit: godot
        sort: top
        time: day
        limit: 15
      - connector: bluesky
        query: "gamedev OR indiedev"
        sort: latest
        limit: 25
      - connector: rss
        feed_url: "https://www.gamedeveloper.com/rss.xml"
        limit: 15
      - connector: x
        query: "unreal OR unity OR godot OR gamedev min_faves:30 lang:en"
        query_type: Latest
        limit: 20

  xr:
    title: "XR / VR / AR"
    tags: [xr, vr, ar, spatial]
    focus: >
      Extended reality — VR/AR/MR headsets, spatial computing, WebXR,
      immersive content tools, and platform/SDK news relevant to an XR studio.
    sources:
      - connector: reddit
        subreddit: virtualreality
        sort: top
        time: day
        limit: 25
      - connector: reddit
        subreddit: oculus
        sort: top
        time: day
        limit: 20
      - connector: reddit
        subreddit: Quest3
        sort: top
        time: week
        limit: 15
      - connector: reddit
        subreddit: HoloLens
        sort: top
        time: week
        limit: 10
      - connector: reddit
        subreddit: WebXR
        sort: top
        time: week
        limit: 10
      - connector: x
        query: "vr OR ar OR xr OR \"spatial computing\" min_faves:30 lang:en"
        query_type: Latest
        limit: 20

  web-frontend:
    title: "Web & Frontend"
    tags: [web, frontend, framework]
    focus: >
      Web platform and frontend — frameworks (React, Astro, Svelte, Vue),
      browser APIs, build tooling, performance, and shipping web products.
    sources:
      - connector: hackernews
        limit: 30
      - connector: reddit
        subreddit: webdev
        sort: top
        time: day
        limit: 25
      - connector: reddit
        subreddit: reactjs
        sort: top
        time: day
        limit: 15
      - connector: reddit
        subreddit: nextjs
        sort: top
        time: day
        limit: 15
      - connector: reddit
        subreddit: javascript
        sort: top
        time: day
        limit: 15
      - connector: bluesky
        query: "#webdev OR #frontend OR React OR Astro"
        sort: latest
        limit: 25
      # NOTE: YouTube feed endpoint 404s from this network (geo/IP block) —
      # connector kept available in code but removed from this topic.
      - connector: x
        query: "react OR astro OR svelte OR nextjs min_faves:50 lang:en"
        query_type: Latest
        limit: 20

  edtech:
    title: "EdTech"
    tags: [edtech, learning, education]
    focus: >
      Education technology — learning platforms, AI tutoring, language
      learning, classroom tools, and edtech business/product moves.
    sources:
      - connector: reddit
        subreddit: edtech
        sort: top
        time: week
        limit: 25
      - connector: reddit
        subreddit: teachers
        sort: top
        time: week
        limit: 15
      - connector: reddit
        subreddit: learnprogramming
        sort: top
        time: day
        limit: 15
      - connector: reddit
        subreddit: languagelearning
        sort: top
        time: week
        limit: 15
      - connector: bluesky
        query: "edtech OR \"AI tutor\" OR \"language learning\""
        sort: latest
        limit: 20
      - connector: x
        query: "edtech OR \"ai tutor\" OR \"language learning\" min_faves:20 lang:en"
        query_type: Latest
        limit: 20
