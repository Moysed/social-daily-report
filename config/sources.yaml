# Social Daily Report — source config.
# Every source is KEYLESS (free, no API key) EXCEPT X (Xquik, paid).
#
# connector params:
#   hackernews            limit
#   bluesky    query      [sort: top|latest]
#   reddit     subreddit  [query] [sort: top|hot|new] [time: ...] [min_score]
#   lobsters   [tag]      [min_score]
#   youtube    channel_id | playlist_id | user
#   rss        feed_url | feeds: [..]
#   x          query      [query_type: Latest|Top]
#
# min_score (reddit): 30 on large subs to drop meme/low-effort posts. Niche
# subs (Quest3, HoloLens, WebXR, godot, edtech) use 5 so they're not silenced.
#
# Xquik quota = 150K posts/month. Budget per fire (2 fires/day × 30) ≈ 2,500.
# Two X sub-queries per topic, calibrated to land around 2,400-2,500/fire.

lookback_hours: 48

topics:
  ai-devtools:
    title: "AI Devtools"
    tags: [ai, devtools, agents]
    focus: >
      AI developer tools, coding agents, LLM APIs and models, IDE/editor AI,
      agent frameworks, eval/observability tooling — anything a software /
      game / XR / edutech studio could realistically adopt.
    sources:
      - connector: hackernews
        limit: 40
      - connector: reddit
        subreddit: LocalLLaMA
        sort: top
        time: day
        limit: 25
        min_score: 30
      - connector: reddit
        subreddit: MachineLearning
        sort: top
        time: day
        limit: 15
        min_score: 10
      - connector: bluesky
        query: "AI agents OR coding agents lang:en"
        sort: latest
        limit: 25
      - connector: rss
        feed_url: "https://huggingface.co/blog/feed.xml"
        limit: 15
      - connector: lobsters
        tag: ai
        limit: 20
      - connector: x
        query: "(claude code OR cursor OR copilot OR codex) min_faves:50 lang:en"
        query_type: Latest
        limit: 120
      - connector: x
        query: "(\"MCP server\" OR \"agent skills\" OR \"tool use\") min_faves:30 lang:en"
        query_type: Latest
        limit: 120

