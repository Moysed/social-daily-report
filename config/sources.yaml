  ai-research:
    title: "AI Research"
    tags: [ai-research, papers, benchmarks, evals]
    focus: >
      AI research signal — new arXiv papers, benchmark results, evaluation
      methodologies, model cards, and reproducible eval suites. Filters for
      results a studio team needs to know before adopting a model or method.
      Skip pure theory threads; surface findings that move adoption decisions.
    sources:
      - connector: reddit
        subreddit: MachineLearning
        sort: top
        time: week
        limit: 25
        min_score: 50
      - connector: reddit
        subreddit: LocalLLaMA
        sort: top
        time: week
        limit: 15
        min_score: 30
      - connector: rss
        feed_url: "https://export.arxiv.org/rss/cs.AI"
        limit: 15
      - connector: rss
        feed_url: "https://export.arxiv.org/rss/cs.CL"
        limit: 15
      - connector: bluesky
        query: "arxiv OR \"new paper\" OR benchmark lang:en"
        sort: latest
        limit: 20
      # Wide net: papers + benchmarks + interpretability — anything an
      # AI-adjacent research thread tends to mention. min_faves trimmed to 10
      # so smaller-account researchers (where the actual signal lives) make it
      # past the engagement gate.
      - connector: x
        query: "(arxiv OR \"new paper\" OR \"new benchmark\" OR \"SOTA\" OR \"state of the art\") (LLM OR \"language model\" OR transformer OR \"deep learning\") min_faves:10 lang:en"
        query_type: Latest
        limit: 120
